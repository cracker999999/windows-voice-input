name: Build Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore VoiceInput/VoiceInput.csproj -r win-x64

      - name: Build Release
        run: dotnet build VoiceInput/VoiceInput.csproj -c Release --no-restore

      - name: Publish Release
        run: dotnet publish VoiceInput/VoiceInput.csproj -c Release -r win-x64 --self-contained false -p:IncludeNativeLibrariesForSelfExtract=true --no-build

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceInput-win-x64
          path: Release/VoiceInput.exe
          if-no-files-found: error

      - name: Publish To GitHub Releases
        uses: ncipollo/release-action@v1
        with:
          tag: main-latest
          name: Main Latest Build
          body: |
            Auto build from main.
            Commit: ${{ github.sha }}
          artifacts: Release/VoiceInput.exe
          allowUpdates: true
          replacesArtifacts: true
          prerelease: true
